<head>
  <meta charset="utf-8" />
  <title>{{ .Title }}</title>

  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />

  {{ with .Site.Params.author }}
  <meta name="author" content="{{ . }}">
  {{ end }}

  <!-- This site is optimized with the Yoast SEO plugin v6.0 - https://yoast.com/wordpress/plugins/seo/ -->
  <meta name="description" content="{{  $.Site.Params.blogSubTitle | truncate 150 }}" />
  <link rel="canonical" href="{{ .Permalink }}" />
  <meta property="og:locale" content="en_US" />
  <meta property="og:type" content="article" />
  <meta property="og:title" content="{{ .Title }} - {{ .Site.Params.blogTitle }}" />
  <meta property="og:description" content="{{  $.Site.Params.blogSubTitle | truncate 150 }}" />
  <meta property="og:url" content="{{ .Permalink }}" />
  <meta property="og:site_name" content="{{ .Title }}" />
  
  <meta property="article:published_time" content="{{ .Date.Format "2006-01-02" }}T{{ .Date.Format "15:04:05" }}+07:00" />
  <meta property="og:image" content="{{{ .Params.featureImage  | absURL }}" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:description" content="{{ .Params.potongan }}" />
  <meta name="twitter:title" content="{{ .Title }} - {{ .Site.Title }}" />
  <meta name="twitter:image" content="{{ .Params.featureImage  | absURL }}" />
  <script type='application/ld+json'>
      {
          "@context": "http:\/\/schema.org",
          "@type": "WebSite",
          "@id": "#website",
          "url": "http:\/\/{{ .Site.Params.url }}\/",
          "name": "Opini",
          "potentialAction": {
              "@type": "SearchAction",
              "target": "http:\/\/{{ .Site.Params.url }}\/?s={search_term_string}",
              "query-input": "required name=search_term_string"
          }
      }

  </script>
  <script type='application/ld+json'>
      {
          "@context": "http:\/\/schema.org",
          "@type": "Person",
          "url": "http:\/\/{{ .Site.Params.url }}\/{{ .Title | urlize }}\/",
          "sameAs": [],
          "@id": "#person",
          "name": "{{ .Site.Title }}"
      }

  </script>
  
  <!-- / Yoast SEO plugin. -->
  {{ hugo.Generator }}

  <link rel="stylesheet" href={{ "plugins/font-awesome/css/font-awesome.min.css" | absURL }} />
  {{ $style := resources.Get "scss/style.scss" | resources.ToCSS | minify }}
  <link href="{{ $style.Permalink }}" rel="stylesheet" />
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <link rel="shortcut icon" href={{ "images/favicon.ico" | absURL }} type="image/x-icon" />
  <link rel="icon" href={{ "images/favicon.svg" | absURL }} type="image/x-icon" />
</head>
